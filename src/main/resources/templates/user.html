<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>User Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">

            <b th:text="${#authentication.name}"></b>

            with roles:

            <span th:each="role : ${#authentication.authorities}"
                  th:text="${role.authority} + ' '">
            </span>

        </span>

        <form th:action="@{/logout}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <button class="btn btn-outline-light">
                Logout
            </button>

        </form>

    </div>

</nav>


<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 bg-white vh-100 p-3 border-end">
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="btn btn-primary text-sm-center btn-sm w-100 text-start active"
                       th:href="@{/admin}">
                        Admin
                    </a>
                </li>

                <li class="nav-item">
                    <a class="btn btn-outline-primary text-sm-center btn-sm w-100 text-start"
                       th:href="@{/user}">
                        User
                    </a>
                </li>
            </ul>
        </div>


            <div class="col-md-10 p-4">
                <h2>User Information Page</h2>
                <div class="border p-3 mb-3 bg-grey">
                    <h4 class="mb-0">About User</h4>
                </div>
                <div class="table-responsive border border-top bg-white px-3 pt-3 pb-4">

                    <table class="table table-striped table-hover align-middle mb-0">
                        <thead class="bg-white border-bottom border-top">
                        <tr>

                            <th>ID</th>
                            <th>Username</th>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>

                        </tr>
                        </thead>
                        <tbody>
                        <tr>

                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>

                            <td>
                                <span th:each="role : ${user.roles}"
                                      th:text="${role.name} + ' '">
                                </span>
                            </td>

                        </tr>

                        </tbody>

                    </table>

                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
