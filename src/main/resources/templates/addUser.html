<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5" style="max-width: 500px">

    <h2 class="mb-4 text-center">Add User</h2>

    <div th:if="${errorMessage}" class="alert alert-danger">
        <p th:text="${errorMessage}"></p>
    </div>

    <form th:action="@{/admin/newUser}" th:object="${user}" method="post">

        <input type="hidden" th:field="*{id}" />

        <div class="mb-3">
            <label class="form-label">Roles</label>

            <div th:each="role : ${roles}" class="form-check">
                <input class="form-check-input"
                       type="checkbox"
                       th:field="*{roles}"
                       th:value="${role.id}">

                <label class="form-check-label"
                       th:text="${role.name}">
                </label>
            </div>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('roles')}"
                 th:errors="*{roles}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Username</label>

            <input type="text"
                   class="form-control"
                   th:field="*{username}"
                   required>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('username')}"
                 th:errors="*{username}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">First name</label>

            <input type="text"
                   class="form-control"
                   th:field="*{firstName}"
                   required>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('firstName')}"
                 th:errors="*{firstName}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Last name</label>

            <input type="text"
                   class="form-control"
                   th:field="*{lastName}"
                   required>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('lastName')}"
                 th:errors="*{lastName}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Age</label>

            <input type="number"
                   class="form-control"
                   th:field="*{age}"
                   required>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('age')}"
                 th:errors="*{age}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>

            <input type="text"
                   class="form-control"
                   th:field="*{email}"
                   required>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('email')}"
                 th:errors="*{email}">
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>

            <input type="password"
                   class="form-control"
                   th:field="*{password}"
                   required>

            <div class="text-danger"
                 th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}">
            </div>
        </div>

        <div class="d-grid gap-2">

            <button type="submit" class="btn btn-primary">
                Save
            </button>

            <a th:href="@{/admin}" class="btn btn-secondary">
                Back
            </a>

        </div>

    </form>

    <form th:action="@{/logout}" method="post" class="mt-3">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <div class="d-grid">
            <button type="submit" class="btn btn-danger">
                Logout
            </button>
        </div>

    </form>

</div>

</body>
</html>
