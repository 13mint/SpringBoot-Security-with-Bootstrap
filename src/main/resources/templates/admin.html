<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-text text-white">

            <b th:text="${#authentication.name}"></b>

            with roles:

            <span th:each="role : ${#authentication.authorities}"
                  th:text="${role.authority} + ' '">
            </span>

        </span>

        <form th:action="@{/logout}" method="post">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <button class="btn btn-outline-light">
                Logout
            </button>

        </form>

    </div>

</nav>


<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 bg-light vh-100 p-3">
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link active"
                       th:href="@{/admin}">
                        Admin
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       th:href="@{/user}">
                        User
                    </a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <h2>Admin panel</h2>
            <ul class="nav nav-tabs mb-4">
                <li class="nav-item">
                    <button class="nav-link active"
                            data-bs-toggle="tab"
                            data-bs-target="#usersTable">
                        Users table
                    </button>
                </li>

                <li class="nav-item">
                    <button class="nav-link"
                            data-bs-toggle="tab"
                            data-bs-target="#newUser">
                        New user
                    </button>
                </li>
            </ul>


            <div class="tab-content">
                <div class="tab-pane fade show active"
                     id="usersTable">
                    <table class="table table-striped">
                        <thead>
                        <tr>

                            <th>ID</th>
                            <th>Username</th>
                            <th>First name</th>
                            <th>Last name</th>
                            <th>Age</th>
                            <th>Email</th>
                            <th>Roles</th>
                            <th>Edit</th>
                            <th>Delete</th>

                        </tr>
                        </thead>
                        <tbody>

                        <tr th:each="user : ${users}">

                            <td th:text="${user.id}"></td>
                            <td th:text="${user.username}"></td>
                            <td th:text="${user.firstName}"></td>
                            <td th:text="${user.lastName}"></td>
                            <td th:text="${user.age}"></td>
                            <td th:text="${user.email}"></td>

                            <td>

                                <span th:each="role : ${user.roles}"
                                      th:text="${role.name} + ' '">
                                </span>

                            </td>

                            <td>

                                <button class="btn btn-primary btn-sm"
                                        data-bs-toggle="modal"
                                        data-bs-target="#editModal"

                                        th:attr="data-id=${user.id},
                                                 data-username=${user.username},
                                                 data-firstname=${user.firstName},
                                                 data-lastname=${user.lastName},
                                                 data-age=${user.age},
                                                 data-email=${user.email},
                                                 data-roles=${user.roleIds}">
                                    Edit
                                </button>


                            </td>

                            <td>
                                <form th:action="@{/admin/delete/{id}(id=${user.id})}"
                                      method="post">
                                    <button class="btn btn-danger btn-sm">
                                        Delete
                                    </button>
                                </form>
                            </td>
                        </tr>

                        </tbody>

                    </table>

                </div>


                <div class="tab-pane fade" id="newUser">

                    <div class="container mt-4" style="max-width:500px">

                        <h4 class="text-center mb-4">Add User</h4>

                        <div th:if="${errorMessage}" class="alert alert-danger">
                            <p th:text="${errorMessage}"></p>
                        </div>

                        <form th:action="@{/admin/newUser}" th:object="${user}" method="post">

                            <input type="hidden" th:field="*{id}" />

                            <div class="mb-3">

                                <label class="form-label">Roles</label>

                                <div th:each="role : ${roles}" class="form-check">

                                    <label>
                                        <input class="form-check-input"
                                               type="checkbox"
                                               th:field="*{roles}"
                                               th:value="${role.id}">
                                    </label>

                                    <label class="form-check-label"
                                           th:text="${role.name}">
                                    </label>

                                </div>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('roles')}"
                                     th:errors="*{roles}">
                                </div>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">Username</label>

                                <label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{username}"
                                           required>
                                </label>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('username')}"
                                     th:errors="*{username}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">First name</label>
                                <label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{firstName}"
                                           required>
                                </label>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('firstName')}"
                                     th:errors="*{firstName}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Last name</label>
                                <label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{lastName}"
                                           required>
                                </label>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('lastName')}"
                                     th:errors="*{lastName}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Age</label>

                                <label>
                                    <input type="number"
                                           class="form-control"
                                           th:field="*{age}"
                                           required>
                                </label>

                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('age')}"
                                     th:errors="*{age}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <label>
                                    <input type="text"
                                           class="form-control"
                                           th:field="*{email}"
                                           required>
                                </label>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('email')}"
                                     th:errors="*{email}">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <label>
                                    <input type="password"
                                           class="form-control"
                                           th:field="*{password}"
                                           required>
                                </label>
                                <div class="text-danger"
                                     th:if="${#fields.hasErrors('password')}"
                                     th:errors="*{password}">
                                </div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit"
                                        class="btn btn-primary">
                                    Create user
                                </button>
                            </div>
                        </form>
                    </div>
                </div>


                <div class="modal fade" id="editModal" tabindex="-1">

                    <div class="modal-dialog">

                        <div class="modal-content">

                            <div class="modal-header">

                                <h5 class="modal-title">
                                    Edit user
                                </h5>

                                <button class="btn-close" data-bs-dismiss="modal">
                                </button>

                            </div>

                            <form th:action="@{/admin/edit}"
                                  method="post">

                                <div class="modal-body">

                                    <input type="hidden" id="editId"
                                           name="id">

                                    <div class="mb-3">
                                        <label class="form-label">Roles</label>
                                        <div th:each="role : ${roles}" class="form-check">
                                            <label>
                                                <input class="form-check-input" type="checkbox"
                                                       name="roles"
                                                       th:value="${role.id}">
                                            </label>
                                            <label class="form-check-label" th:text="${role.name}">
                                            </label>
                                        </div>
                                    </div>

                                    <div class="mb-3">

                                        <label class="form-label">
                                            Username
                                        </label>

                                        <label for="editUsername">
                                            <input class="form-control" id="editUsername" name="username">
                                        </label>

                                    </div>

                                    <div class="mb-3">

                                        <label class="form-label">
                                            First name
                                        </label>

                                        <label for="editFirstName">
                                            <input class="form-control" id="editFirstName" name="firstName">
                                        </label>

                                    </div>

                                    <div class="mb-3">

                                        <label class="form-label">
                                            Last name
                                        </label>

                                        <label for="editLastName">
                                            <input class="form-control" id="editLastName" name="lastName">
                                        </label>

                                    </div>

                                    <div class="mb-3">

                                        <label class="form-label">
                                            Age
                                        </label>

                                        <label for="editAge">
                                            <input type="number" class="form-control" id="editAge" name="age">
                                        </label>

                                    </div>

                                    <div class="mb-3">

                                        <label class="form-label">
                                            Email
                                        </label>

                                        <label for="editEmail">
                                            <input class="form-control" id="editEmail" name="email">
                                        </label>

                                    </div>

                                </div>

                                <div class="modal-footer">

                                    <button class="btn btn-secondary"
                                            data-bs-dismiss="modal"
                                            type="button">
                                        Close
                                    </button>

                                    <button class="btn btn-primary"
                                            type="submit">
                                        Save
                                    </button>

                                </div>

                            </form>

                        </div>

                    </div>

                </div>






            </div>
        </div>
    </div>
</div>


<script>

    document.addEventListener("DOMContentLoaded", function () {

        const editModal = document.getElementById('editModal');

        editModal.addEventListener('show.bs.modal', function (event) {
            const button = event.relatedTarget;
            const rolesString = button.getAttribute('data-roles');
            const selectedRoles = rolesString ? rolesString.split(',') : [];

            document.getElementById('editId').value =
                button.getAttribute('data-id');

            document.querySelectorAll('.role-checkbox').forEach(cb => {
                cb.checked = false;
            });

            selectedRoles.forEach(roleId => {
                const checkbox = document.querySelector(
                    '.role-checkbox[value="' + roleId + '"]'
                );
                if (checkbox) checkbox.checked = true;
            });

            document.getElementById('editUsername').value =
                button.getAttribute('data-username');

            document.getElementById('editFirstName').value =
                button.getAttribute('data-firstname');

            document.getElementById('editLastName').value =
                button.getAttribute('data-lastname');

            document.getElementById('editAge').value =
                button.getAttribute('data-age');

            document.getElementById('editEmail').value =
                button.getAttribute('data-email');

        });

    });

</script>

</body>
</html>
